name: watson Export

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python watson.py

      - name: Upload JSON
        uses: actions/upload-artifact@v4
        with:
          name: watson-export
          path: watson_export.json
